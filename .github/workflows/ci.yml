# The PR-time `terraform-plan` job was removed intentionally. The CI role's
# trust policy (infra/envs/dev/ci.tf) no longer accepts `pull_request` OIDC
# tokens — only `ref:refs/heads/main` — because the role currently holds
# AdministratorAccess and any PR (including one modifying the workflow) could
# otherwise assume full admin. Plan+apply still runs on merge to main via
# deploy.yml; we've traded PR-time plan preview for a tighter trust scope.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}

jobs:
  backend-test:
    name: Backend — pytest + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install deps
        run: pip install -r backend/requirements-dev.txt

      - name: Lint
        run: ruff check backend/src backend/tests

      - name: Test
        run: pytest -q backend

  frontend-build:
    name: Frontend — tsc + vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          # Build-time values can be placeholders for the type-check pass; the real
          # values get injected when the deploy job rebuilds with production vars.
          VITE_AWS_REGION: ${{ vars.AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.COGNITO_SPA_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.COGNITO_DOMAIN }}
          VITE_API_ENDPOINT: ${{ vars.API_ENDPOINT }}

